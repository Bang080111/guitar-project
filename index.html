<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기타 마스터 - 쉽게 배우는 기타</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div class="logo">🎸 기타 마스터</div>
            <ul>
                <li><a href="#home">홈</a></li>
                <li><a href="#chords">코드</a></li>
                <li><a href="#tuner">튜너</a></li>
                <li><a href="#practice">연습</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="hero-content">
                <h1>기타를 쉽게 배워보세요!</h1>
                <p>초보자도 쉽게 따라할 수 있는 기타 학습 사이트입니다</p>
                <button class="cta-button" onclick="scrollToSection('chords')">시작하기</button>
            </div>
            <div class="hero-image">
                <div class="guitar-animation">🎸</div>
            </div>
        </section>

        <section id="chords" class="chords-section">
            <h2>기본 기타 코드</h2>
            <div class="chord-grid">
                <div class="chord-card" data-chord="C">
                    <h3>C 코드</h3>
                    <div class="chord-diagram">
                        <div class="fretboard">
                            <div class="string" data-string="1" data-fret="0">○</div>
                            <div class="string" data-string="2" data-fret="1">●</div>
                            <div class="string" data-string="3" data-fret="0">○</div>
                            <div class="string" data-string="4" data-fret="2">●</div>
                            <div class="string" data-string="5" data-fret="3">●</div>
                            <div class="string" data-string="6" data-fret="0">○</div>
                        </div>
                    </div>
                    <button class="play-chord" onclick="playChord('C')">재생</button>
                </div>

                <div class="chord-card" data-chord="G">
                    <h3>G 코드</h3>
                    <div class="chord-diagram">
                        <div class="fretboard">
                            <div class="string" data-string="1" data-fret="3">●</div>
                            <div class="string" data-string="2" data-fret="0">○</div>
                            <div class="string" data-string="3" data-fret="0">○</div>
                            <div class="string" data-string="4" data-fret="0">○</div>
                            <div class="string" data-string="5" data-fret="2">●</div>
                            <div class="string" data-string="6" data-fret="3">●</div>
                        </div>
                    </div>
                    <button class="play-chord" onclick="playChord('G')">재생</button>
                </div>

                <div class="chord-card" data-chord="Am">
                    <h3>Am 코드</h3>
                    <div class="chord-diagram">
                        <div class="fretboard">
                            <div class="string" data-string="1" data-fret="0">○</div>
                            <div class="string" data-string="2" data-fret="1">●</div>
                            <div class="string" data-string="3" data-fret="2">●</div>
                            <div class="string" data-string="4" data-fret="2">●</div>
                            <div class="string" data-string="5" data-fret="0">○</div>
                            <div class="string" data-string="6" data-fret="0">○</div>
                        </div>
                    </div>
                    <button class="play-chord" onclick="playChord('Am')">재생</button>
                </div>

                <div class="chord-card" data-chord="F">
                    <h3>F 코드</h3>
                    <div class="chord-diagram">
                        <div class="fretboard">
                            <div class="string" data-string="1" data-fret="1">●</div>
                            <div class="string" data-string="2" data-fret="1">●</div>
                            <div class="string" data-string="3" data-fret="2">●</div>
                            <div class="string" data-string="4" data-fret="3">●</div>
                            <div class="string" data-string="5" data-fret="3">●</div>
                            <div class="string" data-string="6" data-fret="1">●</div>
                        </div>
                    </div>
                    <button class="play-chord" onclick="playChord('F')">재생</button>
                </div>
            </div>
        </section>

        <section id="tuner" class="tuner-section">
            <h2>기타 튜너</h2>
            <div class="tuner-container">
                <div class="tuner-display">
                    <div class="note-display">E</div>
                    <div class="tuner-needle">
                        <div class="needle"></div>
                    </div>
                    <div class="frequency">440 Hz</div>
                </div>
                <div class="string-buttons">
                    <button class="string-btn" data-note="E" data-frequency="82.41">6번줄 (E)</button>
                    <button class="string-btn" data-note="A" data-frequency="110.00">5번줄 (A)</button>
                    <button class="string-btn" data-note="D" data-frequency="146.83">4번줄 (D)</button>
                    <button class="string-btn" data-note="G" data-frequency="196.00">3번줄 (G)</button>
                    <button class="string-btn" data-note="B" data-frequency="246.94">2번줄 (B)</button>
                    <button class="string-btn" data-note="E" data-frequency="329.63">1번줄 (E)</button>
                </div>
            </div>
        </section>

        <section id="practice" class="practice-section">
            <h2>연습 모드</h2>
            <div class="practice-container">
                <div class="practice-card">
                    <h3>코드 변환 연습</h3>
                    <div class="chord-sequence">
                        <span class="chord">C</span> → <span class="chord">G</span> → <span class="chord">Am</span> → <span class="chord">F</span>
                    </div>
                    <div class="timer">00:00</div>
                    <button class="start-practice">연습 시작</button>
                </div>
                
                <div class="practice-card">
                    <h3>스트럼 패턴</h3>
                    <div class="strum-pattern">
                        <div class="pattern-visual">↓ ↑ ↓ ↑ ↓ ↑ ↓ ↑</div>
                    </div>
                    <button class="start-strum">스트럼 시작</button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 기타 마스터. 모든 권리 보유.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
